<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnekerSupply - Elevate Your Style</title>

    <link rel="icon" type="image/png" href="images/assets/favicon.png" />

    <meta
        name="description"
        content="Descubra a moda esportiva de alta qualidade na SnekerSupply. Tênis e Sneakers para todos os estilos."
    />

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components/header.css" />
    <link rel="stylesheet" href="./css/components/hero.css" />
    <link rel="stylesheet" href="./css/components/product-category.css" />
    <link rel="stylesheet" href="./css/components/product-grid.css" />
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <h1 class="logo">
            <a href="/" title="SnekerSupply - Tênis e Sneakers de Qualidade">
                <img
                    src="images/logo/logo.svg"
                    alt="SnekerSupply - Tênis e Sneakers de Qualidade"
                />
            </a>
        </h1>

        <nav class="nav-center">
            <ul>
                <li><a href="#">Homem</a></li>
                <li><a href="#">Mulher</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>
        </nav>

        <nav class="nav-right">
            <ul>
                <li><a href="#">Nossas lojas</a></li>
                <li><a href="#">Sobre</a></li>
                <li>
                    <a href="#"><img src="./images/icons/user_icon.svg" alt="Perfil" height="24"></a>
                </li>
                <li>
                    <a href="#"><img src="./images/icons/help_icon.svg" alt="Ajuda" height="24"></a>
                </li>
                <li>
                    <a href="#"><img src="./images/icons/bag_icon.svg" alt="Sacola" height="24"></a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <!-- HERO -->
        <section class="hero-section">
            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-subtitle">Drop novo, atitude nova</span>

                    <h1 class="hero-title">
                        Eleve seu estilo a outro nível.
                    </h1>

                    <div class="hero-buttons">
                        <a class="hero-btn hero-btn-outline" href="#">Ver Modelos</a>
                        <a class="hero-btn hero-btn-filled" href="#">Comprar</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- CATEGORIAS -->
        <section class="categories-section">

            <div class="category-card casual">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name">Casual</span>
                </a>
            </div>

            <div class="category-card esporte">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name">Esporte</span>
                </a>
            </div>

            <div class="category-card moderno">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name">Moderno</span>
                </a>
            </div>

            <div class="category-card futurista">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name">Futurista</span>
                </a>
            </div>

        </section>

        <!-- GRID -->
        <section class="grid-section"> 

            <div class="card top1">
                <div class="top1-content">
                    <h3 class="card-title">Nova Coleção</h3>
                    <p class="card-subtitle">
                        Design, exclusividade e presença em cada passo.
                    </p>
                    <div class="cta-group">
                        <a href="#" class="btn btn-outline">Homem</a>
                        <a href="#" class="btn btn-outline">Mulher</a>
                    </div>
                </div>
            </div>

            <div class="card top2"></div>
            <div class="card midL"></div>
            <div class="card midR"></div>
            <div class="card bottomL"></div>
            <div class="card bottomR"></div>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <!-- Informações futuras -->
    </footer>

</body>
</html>
