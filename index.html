<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SnekerSupply - Elevate Your Style</title>
        <link rel="icon" type="image/png" href="images/assets/favicon.png" />
        <meta
            name="description"
            content="Descubra a moda esportiva de alta qualidade na SnekerSupply. Tênis e Sneakers para todos os estilos."
        />

        <link rel="stylesheet" href="./css/reset.css" />
        <link rel="stylesheet" href="./css/variables.css" />
        <link rel="stylesheet" href="./css/base.css" />
        <link rel="stylesheet" href="./css/layout.css" />
        <link rel="stylesheet" href="./css/components/header.css" />
        <link rel="stylesheet" href="./css/components/hero.css" />
        <link rel="stylesheet" href="./css/components/product-category.css" />
    </head>

    <body>
        <header class="header">
            <h1 class="logo">
                <a
                    href="/"
                    title="SnekerSupply - Tênis e Sneakers de Qualidade"
                >
                    <img
                        src="images/logo/logo.svg"
                        alt="SnekerSupply - Tênis e Sneakers de Qualidade"
                    />
                </a>
            </h1>
            <nav class="nav-center" aria-label="Categorias Principais">
                <ul>
                    <li><a href="#">Homem</a></li>
                    <li><a href="#">Mulher</a></li>
                    <li><a href="#">Outlet</a></li>
                </ul>
            </nav>
            <nav class="nav-right" aria-label="Menu de Acesso Rápido">
                <ul>
                    <li><a href="#">Nossas lojas</a></li>
                    <li><a href="#">Sobre</a></li>
                    <li>
                        <a href="#"
                            ><img
                                src="./images/icons/user_icon.svg"
                                alt="Perfil"
                                style="height: 24px"
                        /></a>
                    </li>
                    <li>
                        <a href="#"
                            ><img
                                src="./images/icons/help_icon.svg"
                                alt="Ajuda"
                                style="height: 24px"
                        /></a>
                    </li>
                    <li>
                        <a href="#"
                            ><img
                                src="./images/icons/bag_icon.svg"
                                alt="Sacola"
                                style="height: 24px"
                        /></a>
                    </li>
                </ul>
            </nav>
        </header>

        <main>
            <!-- Hero Section -->
            <section class="hero-section">
                <div class="hero-overlay">
                    <div class="hero-content">
                        <span class="hero-subtitle">Nova Coleção</span>

                        <h1 class="hero-title">
                            Eleve seu estilo a outro nível.
                        </h1>

                        <!-- Botões do Hero atualizados -->
                        <div class="hero-buttons">
                            <a class="hero-btn hero-btn-outline" href="#"
                                >Ver Modelos</a
                            >
                            <a class="hero-btn hero-btn-filled" href="#"
                                >Comprar</a
                            >
                        </div>
                    </div>
                </div>
            </section>

            <!-- Categorias -->
            <section id="categorias">
                <!-- Seção de categorias de tênis -->
            </section>

            <section class="categories-section">
                <div class="category-card casual">
                    <a href="#" class="category-link">
                        <span class="overlay"></span>
                        <span class="category-name btn-outline">Casual</span>
                    </a>
                </div>

                <div class="category-card esporte">
                    <a href="#" class="category-link">
                        <span class="overlay"></span>
                        <span class="category-name">Esporte</span>
                    </a>
                </div>

                <div class="category-card moderno">
                    <a href="#" class="category-link">
                        <span class="overlay"></span>
                        <span class="category-name">Moderno</span>
                    </a>
                </div>

                <div class="category-card futurista">
                    <a href="#" class="category-link">
                        <span class="overlay"></span>
                        <span class="category-name">Futurista</span>
                    </a>
                </div>
            </section>
        </main>

        <footer>
            <!-- Informações de contato e links -->
        </footer>
    </body>
</html>
