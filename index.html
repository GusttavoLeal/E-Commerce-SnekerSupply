<body>
    <header class="header">
        <h1 class="logo">
            <a href="/" title="SnekerSupply - Tênis e Sneakers de Qualidade">

            </a>
        </h1>
        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Homem</a></li>
                <li><a href="#">Mulher</a></li>

                    <span class="hero-subtitle">Nova Coleção</span>

                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#">Ver Modelos</a>
                        <a class="btn btn-filled" href="#">Comprar</a>
                    </div>
                </div>
            </div>
        </section>
        <section id="categorias">
            <!-- Seção de categorias de tênis -->
        </section>
        <section id="produtos-destaque">
            <!-- Grid com produtos em destaque -->
        </section>

    <footer>
        <!-- Informações de contato e links -->
    </footer>
