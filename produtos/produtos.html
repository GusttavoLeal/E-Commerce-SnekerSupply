<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine NoxStride</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <section class="vitrine">
        <div class="card">
            <div class="image-container">
                <img src="../images/grid/grid15.png" alt="Tênis 1">
                <button class="wishlist"><i class="fa-regular fa-heart"></i></button>
            </div>
            <div class="info">
                <h3>Tênis 1</h3>
                <p class="categoria">Casual</p>
                <div class="preco-container">
                    <span class="preco-pix">R$ 854,99 no Pix</span>
                    <span class="preco-antigo">R$ 899,99</span>
                </div>
                <span class="desconto">5% off</span>
                <div class="rating">★★★★☆ <span>4.5</span></div>
            </div>
        </div>

        <div class="card">
            <div class="image-container">
                <img src="../images/grid/grid14.png" alt="Tênis 2">
                <button class="wishlist"><i class="fa-regular fa-heart"></i></button>
            </div>
            <div class="info">
                <h3>Tênis 2</h3>
                <p class="categoria">Moderno</p>
                <div class="preco-container">
                    <span class="preco-pix">R$ 265,99 no Pix</span>
                    <span class="preco-antigo">R$ 329,99</span>
                </div>
                <span class="desconto">19% off</span>
                <div class="rating">★★★★☆ <span>4.3</span></div>
            </div>
        </div>

        <div class="card">
            <div class="image-container">
                <img src="../images/grid/grid13.png" alt="Tênis 3">
                <button class="wishlist"><i class="fa-regular fa-heart"></i></button>
            </div>
            <div class="info">
                <h3>Tênis 3</h3>
                <p class="categoria">Casual</p>
                <div class="preco-container">
                    <span class="preco-pix">R$ 398,99 no Pix</span>
                    <span class="preco-antigo">R$ 599,99</span>
                </div>
                <span class="desconto">34% off</span>
                <div class="rating">★★★★★ <span>5.0</span></div>
            </div>
        </div>
    </section>

</body>
</html>
